[workspace]
# Both crates publish to crates.io. The first publish of each is done manually
# (crates.io Trusted Publishing can only be configured on a crate that already
# exists); thereafter release-plz publishes via Trusted Publishing (OIDC) with
# no token - see `.github/workflows/release-plz.yml`.
publish = true
changelog_update = true
# Per-crate tags (`<crate>-v<version>`) so the two independently-versioned crates
# can't collide on a shared `v<version>` tag when they happen to release the same
# version in one run.
git_tag_name = "{{ package }}-v{{ version }}"
git_release_enable = true
# Checks API compatibility against the latest published release via
# cargo-semver-checks (skipped automatically while nothing is published).
semver_check = true
