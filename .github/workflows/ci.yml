name: ci
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Bevy debug binaries are dominated by debuginfo; without trimming it the
  # linker fills the runner's disk ("No space left on device"). CI only needs
  # things to compile and link, so drop debuginfo across all profiles.
  CARGO_PROFILE_DEV_DEBUG: "0"
  CARGO_PROFILE_TEST_DEBUG: "0"

# All tooling (toolchain, system libraries, trunk, wasm-bindgen) comes from the
# nix dev shell / flake so that CI and local development are reproducibly
# identical. Each check is one matrix entry of the single `nix` job.
jobs:
  nix:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - command: develop --command cargo fmt --all -- --check
          - command: develop --command cargo clippy --workspace --all-targets --all-features -- -D warnings
          - command: develop --command cargo test --workspace --locked --all-features
          - command: develop --command cargo check --workspace --locked --examples --all-features
          - command: build --print-build-logs .#wisp-editor-web
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - uses: Swatinem/rust-cache@v2
      - run: nix ${{ matrix.command }}

  # Build the wasm site on PRs and hand it to `deploy-pr-preview` as an
  # artifact (that workflow has the permissions to publish to gh-pages).
  upload-pr-preview-artifact:
    needs: nix
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - uses: Swatinem/rust-cache@v2
      - run: nix build --print-build-logs .#wisp-editor-web
      - name: Prepare artifact
        run: |
          cp -rL result artifact
          chmod -R u+w artifact
          echo "${{ github.event.pull_request.number }}" > artifact/PR_NUMBER
      - uses: actions/upload-artifact@v4
        with:
          name: pr-preview-${{ github.event.pull_request.number }}
          path: artifact/

  # Publish the editor to GitHub Pages on every push to main.
  deploy:
    needs: nix
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - uses: Swatinem/rust-cache@v2
      - run: nix build --print-build-logs .#wisp-editor-web
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./result
          keep_files: true
