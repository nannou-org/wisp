name: ci
on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

# All tooling (toolchain, system libraries) comes from the nix dev shell so
# that CI and local development are reproducibly identical.
jobs:
  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - run: nix develop --command cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - uses: Swatinem/rust-cache@v2
      - run: nix develop --command cargo clippy --all-targets --all-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - uses: Swatinem/rust-cache@v2
      - run: nix develop --command cargo test --locked --all-features

  examples:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - uses: Swatinem/rust-cache@v2
      - run: nix develop --command cargo check --locked --examples --all-features
