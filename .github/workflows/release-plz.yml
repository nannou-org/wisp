# Automated releases: release-plz watches main, maintains a release PR
# (version bump + changelog from conventional commits) and, when that PR merges,
# tags the release, publishes a GitHub Release and publishes the crates to
# crates.io via Trusted Publishing (OIDC - no token: the release job below
# requests `id-token: write` and release-plz exchanges it for a short-lived
# crates.io token).
#
# The first publish of each crate is done manually/locally, because crates.io
# Trusted Publishing can only be configured on a crate that already exists.
#
# Note: the default GITHUB_TOKEN cannot trigger workflows, so CI does not run on
# the release PR itself. Switch to a fine-grained PAT or GitHub App token if that
# becomes important.
name: release-plz
permissions: {}

on:
  push:
    branches: [main]

jobs:
  release-plz-release:
    name: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-plz-pr:
    name: release-pr
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
