# Automated releases: release-plz watches main, maintains a release PR
# (version bump + changelog from conventional commits) and, when that PR
# merges, tags the release and publishes a GitHub Release. Publishing to
# crates.io is currently held back via `publish = false` in release-plz.toml
# (waiting on bevy 0.19 stable).
#
# Notes for arming crates.io publishing later:
# - First publish needs a `CARGO_REGISTRY_TOKEN` repository secret; after the
#   crate exists, configure crates.io Trusted Publishing (OIDC; the
#   `id-token: write` permission below) and drop the token.
# - The default GITHUB_TOKEN cannot trigger workflows, so CI does not run on
#   the release PR itself. Switch to a fine-grained PAT or GitHub App token
#   if that becomes important.
name: release-plz
permissions: {}

on:
  push:
    branches: [main]

jobs:
  release-plz-release:
    name: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-pr:
    name: release-pr
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
