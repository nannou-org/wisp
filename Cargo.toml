[package]
name = "nannou_wisp"
version.workspace = true
description = "Wisp - interactive, reflected WGSL shaders for nannou, built on Bevy."
readme = "README.md"
repository.workspace = true
homepage.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
bevy = { workspace = true, features = [
    "bevy_asset",
    "bevy_core_pipeline",
    "bevy_log",
    "bevy_render",
    "bevy_window",
] }
bevy_egui = { workspace = true, optional = true }
bytemuck.workspace = true
evalexpr.workspace = true
half = { workspace = true, optional = true }
naga.workspace = true
rustfft = { workspace = true, optional = true }
thiserror.workspace = true

[features]
# Waveform/FFT textures for `@audio`/`@audio_fft` bindings, fed from the
# `WispAudio` resource.
audio = ["dep:half", "dep:rustfft"]
# Auto-generated egui control panel for wisp inputs. Requires `bevy_egui`'s
# `EguiPlugin` to be added to the app (nannou's `egui` feature does this).
ui = ["dep:bevy_egui"]
