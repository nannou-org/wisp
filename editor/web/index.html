<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">

    <!-- trunk asset directives. `../Cargo.toml` resolves to `editor/Cargo.toml`;
         the default features build the WebGL2 backend (broad browser support).
         For the WebGPU backend, build with
         `--no-default-features --features webgpu`. -->
    <link data-trunk rel="rust" href="../Cargo.toml" data-bin="wisp-editor"
          data-cargo-profile-release="wasm_release"
          data-wasm-opt="z"
          data-wasm-opt-params="--enable-bulk-memory --enable-reference-types --enable-multivalue --enable-tail-call --enable-nontrapping-float-to-int"
          data-initializer="initializer.js" />

    <title>wisp editor</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100%;
            background-color: #1b1b1b;
        }
        canvas {
            display: block;
            touch-action: none;
        }
        canvas:focus {
            outline: none;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #f0f0f0;
            font-family: sans-serif;
            text-align: center;
        }
        #loading-title {
            font-size: 18px;
            letter-spacing: 0.5em;
            margin: 0 0 12px 0;
        }
        #loading-track {
            width: 100%;
            height: 2px;
            background: #333;
        }
        #loading-bar {
            width: 0%;
            height: 100%;
            background: #f0f0f0;
            transition: width 0.2s ease;
        }
    </style>
</head>
<body>
    <div id="loading">
        <p id="loading-title">w i s p</p>
        <div id="loading-track"><div id="loading-bar"></div></div>
    </div>
    <script>
        document.body.addEventListener("contextmenu", (e) => {
            e.preventDefault();
            e.stopPropagation();
        });

        // Resume any AudioContext on the first user interaction so the
        // `@audio` shaders play under Chrome's autoplay policy:
        // https://developers.google.com/web/updates/2018/11/web-audio-autoplay#moving-forward
        (function () {
            const audioContextList = [];
            const userInputEventNames = [
                "click", "contextmenu", "auxclick", "dblclick",
                "mousedown", "mouseup", "pointerup", "touchend",
                "keydown", "keyup",
            ];

            self.AudioContext = new Proxy(self.AudioContext, {
                construct(target, args) {
                    const result = new target(...args);
                    audioContextList.push(result);
                    return result;
                },
            });

            function resumeAllContexts(_event) {
                let count = 0;
                audioContextList.forEach((context) => {
                    if (context.state !== "running") {
                        context.resume();
                    } else {
                        count++;
                    }
                });

                if (count > 0 && count === audioContextList.length) {
                    userInputEventNames.forEach((eventName) => {
                        document.removeEventListener(eventName, resumeAllContexts);
                    });
                }
            }

            userInputEventNames.forEach((eventName) => {
                document.addEventListener(eventName, resumeAllContexts);
            });
        })();
    </script>
</body>
</html>
